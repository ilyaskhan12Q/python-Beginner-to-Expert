<svg width="160" height="48" viewBox="0 0 160 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg0" x1="0" y1="0" x2="160" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent0" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow0">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="160" height="48" rx="10" fill="url(#bg0)"/>
  <rect x="0.5" y="0.5" width="159" height="47" rx="9.5" stroke="url(#accent0)" stroke-opacity="0.4"/>
  <!-- Seed/sprout icon -->
  <circle cx="22" cy="24" r="10" fill="#4ade80" fill-opacity="0.15"/>
  <text x="22" y="29" text-anchor="middle" font-size="14">🌱</text>
  <!-- Divider -->
  <line x1="40" y1="10" x2="40" y2="38" stroke="#4ade80" stroke-opacity="0.25" stroke-width="1"/>
  <!-- Label -->
  <text x="100" y="17" text-anchor="middle" font-family="monospace" font-size="9" fill="#4ade80" fill-opacity="0.7" letter-spacing="2">PYTHON</text>
  <text x="100" y="33" text-anchor="middle" font-family="'Trebuchet MS', sans-serif" font-size="13" font-weight="700" fill="#ffffff">Beginner</text>
  <!-- Bottom bar -->
  <rect x="48" y="42" width="104" height="2" rx="1" fill="url(#accent0)" opacity="0.5"/>
</svg>
